{% extends "base.html" %}
{% block body %}
  <h1 id="progress-heading">Reading {{ 'your Depop shop' if target == 'vinted' else 'your Vinted closet' }}{{ ' (@' + username + ')' if username else '' }}…</h1>
  <p class="lede" id="progress-status">
    Waiting for the bookmarklet to start — keep the other tab open too.
  </p>

  <div class="panel" id="progress-panel">
    <div class="progress-track">
      <div id="progress-bar-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <p class="hint" id="progress-count" style="margin-top:10px;">Nothing read yet.</p>
  </div>

  <div class="grid" id="results-grid" style="margin-top:20px;"></div>

  <script>
    var target = {{ target|tojson }};
    var targetLabel = target.charAt(0).toUpperCase() + target.slice(1);
    var count = 0;

    function buildCard(item) {
      var title = (item.description || '').split('\n')[0].slice(0, 80) || '(untitled)';
      var priceText = item.price != null ? ((item.currency || '') + ' ' + item.price) : '';
      count++;
      var id = 'draft-' + count;

      var card = document.createElement('div');
      card.className = 'card';

      var head = document.createElement('div');
      head.className = 'card-head';
      var titleLink = document.createElement('a');
      titleLink.className = 'card-title';
      titleLink.href = item.url || '#';
      titleLink.target = '_blank';
      titleLink.textContent = title;
      head.appendChild(titleLink);
      if (priceText) {
        var priceTag = document.createElement('span');
        priceTag.className = 'price-tag';
        priceTag.textContent = priceText;
        head.appendChild(priceTag);
      }
      card.appendChild(head);

      if (item.photos && item.photos.length) {
        var photosDiv = document.createElement('div');
        photosDiv.className = 'photos';
        item.photos.forEach(function (src) {
          var a = document.createElement('a');
          a.href = src; a.target = '_blank';
          var img = document.createElement('img');
          img.src = src; img.alt = '';
          a.appendChild(img);
          photosDiv.appendChild(a);
        });
        card.appendChild(photosDiv);
      }

      var draft = document.createElement('div');
      draft.className = 'draft';
      draft.id = id;
      draft.textContent =
        'Title: ' + title + '\n' +
        'Description: ' + (item.description || '') + '\n' +
        'Price: ' + priceText + '\n' +
        'Brand: ' + (item.brand || '') + '\n' +
        'Size: ' + (item.size || '') + '\n' +
        'Condition: ' + (item.condition || '');
      card.appendChild(draft);

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy for ' + targetLabel;
      btn.onclick = function () {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        var original = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
      };
      card.appendChild(btn);

      return card;
    }

    window.addEventListener('message', function (e) {
      var data = e.data || {};

      if (data.type === 'progress') {
        var pct = data.total ? Math.round((data.done / data.total) * 100) : 0;
        document.getElementById('progress-bar-fill').style.width = pct + '%';
        document.getElementById('progress-count').textContent = data.done + ' of ' + data.total + ' listings read';
        document.getElementById('progress-status').textContent = 'Drafts appear below as each listing is read.';
      }

      if (data.type === 'item' && data.item) {
        document.getElementById('results-grid').appendChild(buildCard(data.item));
      }

      if (data.type === 'done') {
        document.getElementById('progress-panel').style.display = 'none';
        document.getElementById('progress-heading').textContent =
          count + ' listing' + (count === 1 ? '' : 's') + (data.username ? ' from @' + data.username : '') + ', ready for ' + targetLabel;
        document.getElementById('progress-status').innerHTML = '<a href="/">&larr; fetch a different shop</a>';
        if (count === 0) {
          var empty = document.createElement('p');
          empty.className = 'empty';
          empty.textContent = 'No listings found - the bookmarklet may not have been run from the right page, or the site layout changed.';
          document.getElementById('results-grid').appendChild(empty);
        }
      }
    });
  </script>
{% endblock %}
