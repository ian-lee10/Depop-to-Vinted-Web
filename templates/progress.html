{% extends "base.html" %}
{% block body %}
  <h1 id="progress-heading">Reading {{ 'your Depop shop' if target == 'vinted' else 'your Vinted closet' }}{{ ' (@' + username + ')' if username else '' }}…</h1>
  <p class="lede" id="progress-status">
    Waiting for the bookmarklet to start — keep the other tab open too.
  </p>

  <div class="panel" id="progress-panel">
    <div class="progress-track">
      <div id="progress-bar-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <p class="hint" id="progress-count" style="margin-top:10px;">Nothing read yet.</p>
  </div>

  <p class="hint" id="done-count" style="margin-top:0;"></p>

  <div class="grid" id="results-grid" style="margin-top:20px;"></div>

  <script>
    var target = {{ target|tojson }};
    var targetLabel = target.charAt(0).toUpperCase() + target.slice(1);
    var count = 0;

    function flashCopied(btn) {
      var original = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(function () { btn.textContent = original; btn.classList.remove('copied'); }, 1200);
    }

    // Force-download each photo through the same-origin /photo proxy (which
    // sets Content-Disposition: attachment). Staggered so the browser accepts
    // the batch. Filenames are the listing title + index, so they land grouped.
    function downloadPhotos(photos, title) {
      var base = (title || 'photo');
      photos.forEach(function (url, i) {
        setTimeout(function () {
          var a = document.createElement('a');
          a.href = '/photo?u=' + encodeURIComponent(url) + '&name=' + encodeURIComponent(base + '-' + (i + 1));
          a.download = '';
          document.body.appendChild(a);
          a.click();
          a.remove();
        }, i * 400);
      });
    }

    function copyButton(text, small) {
      var btn = document.createElement('button');
      btn.className = small ? 'field-copy-btn' : 'copy-btn';
      btn.textContent = small ? 'Copy' : ('Copy all for ' + targetLabel);
      btn.disabled = !text;
      btn.onclick = function () {
        navigator.clipboard.writeText(text);
        flashCopied(btn);
      };
      return btn;
    }

    function fieldRow(label, value) {
      var row = document.createElement('div');
      row.className = 'field-row';
      var lbl = document.createElement('span');
      lbl.className = 'field-label';
      lbl.textContent = label;
      var val = document.createElement('span');
      val.className = 'field-value';
      val.textContent = value || '—';
      row.appendChild(lbl);
      row.appendChild(val);
      row.appendChild(copyButton(value || '', true));
      return row;
    }

    function buildCard(item) {
      var title = (item.description || '').split('\n')[0].slice(0, 80) || '(untitled)';
      var priceText = item.price != null ? ((item.currency || '') + ' ' + item.price) : '';
      count++;

      var card = document.createElement('div');
      card.className = 'card';

      var head = document.createElement('div');
      head.className = 'card-head';
      var titleLink = document.createElement('a');
      titleLink.className = 'card-title';
      titleLink.href = item.url || '#';
      titleLink.target = '_blank';
      titleLink.textContent = title;
      head.appendChild(titleLink);
      if (priceText) {
        var priceTag = document.createElement('span');
        priceTag.className = 'price-tag';
        priceTag.textContent = priceText;
        head.appendChild(priceTag);
      }
      card.appendChild(head);

      if (item.photos && item.photos.length) {
        var photosDiv = document.createElement('div');
        photosDiv.className = 'photos';
        item.photos.forEach(function (src) {
          var a = document.createElement('a');
          a.href = src; a.target = '_blank';
          var img = document.createElement('img');
          img.src = src; img.alt = '';
          a.appendChild(img);
          photosDiv.appendChild(a);
        });
        card.appendChild(photosDiv);

        var dl = document.createElement('button');
        dl.className = 'field-copy-btn dl-btn';
        dl.textContent = '⬇ Download all ' + item.photos.length + ' photo' + (item.photos.length === 1 ? '' : 's');
        dl.onclick = function () { downloadPhotos(item.photos, title); flashCopied(dl); };
        card.appendChild(dl);
        var dlHint = document.createElement('div');
        dlHint.className = 'hint dl-hint';
        dlHint.textContent = 'Saves to your Downloads folder — then drag them into the new listing.';
        card.appendChild(dlHint);
      }

      var descBlock = document.createElement('div');
      descBlock.className = 'field-block';
      var descHead = document.createElement('div');
      descHead.className = 'field-block-head';
      var descLbl = document.createElement('span');
      descLbl.className = 'field-label';
      descLbl.textContent = 'Description';
      descHead.appendChild(descLbl);
      descHead.appendChild(copyButton(item.description || '', true));
      descBlock.appendChild(descHead);
      var descText = document.createElement('div');
      descText.className = 'draft';
      descText.textContent = item.description || '';
      descBlock.appendChild(descText);
      card.appendChild(descBlock);

      var fields = document.createElement('div');
      fields.className = 'field-rows';
      fields.appendChild(fieldRow('Price', priceText));
      fields.appendChild(fieldRow('Brand', item.brand));
      fields.appendChild(fieldRow('Size', item.size));
      fields.appendChild(fieldRow('Condition', item.condition));
      card.appendChild(fields);

      var fullDraft =
        'Title: ' + title + '\n' +
        'Description: ' + (item.description || '') + '\n' +
        'Price: ' + priceText + '\n' +
        'Brand: ' + (item.brand || '') + '\n' +
        'Size: ' + (item.size || '') + '\n' +
        'Condition: ' + (item.condition || '');

      var actions = document.createElement('div');
      actions.className = 'card-actions';
      actions.appendChild(copyButton(fullDraft, false));

      var doneBtn = document.createElement('button');
      doneBtn.className = 'done-btn';
      doneBtn.textContent = 'Mark done';
      doneBtn.onclick = function () {
        var done = card.classList.toggle('done');
        doneBtn.textContent = done ? 'Done ✓ — undo' : 'Mark done';
        updateDoneCount();
      };
      actions.appendChild(doneBtn);
      card.appendChild(actions);

      return card;
    }

    function updateDoneCount() {
      var total = document.querySelectorAll('#results-grid .card').length;
      var done = document.querySelectorAll('#results-grid .card.done').length;
      var el = document.getElementById('done-count');
      if (el) el.textContent = done ? (done + ' of ' + total + ' marked done') : '';
    }

    window.addEventListener('message', function (e) {
      var data = e.data || {};

      if (data.type === 'progress') {
        var pct = data.total ? Math.round((data.done / data.total) * 100) : 0;
        document.getElementById('progress-bar-fill').style.width = pct + '%';
        document.getElementById('progress-count').textContent = data.done + ' of ' + data.total + ' listings read';
        document.getElementById('progress-status').textContent = 'Drafts appear below as each listing is read.';
      }

      if (data.type === 'item' && data.item) {
        document.getElementById('results-grid').appendChild(buildCard(data.item));
      }

      if (data.type === 'done') {
        document.getElementById('progress-panel').style.display = 'none';
        document.getElementById('progress-heading').textContent =
          count + ' listing' + (count === 1 ? '' : 's') + (data.username ? ' from @' + data.username : '') + ', ready for ' + targetLabel;
        document.getElementById('progress-status').innerHTML = '<a href="/">&larr; fetch a different shop</a>';
        if (count === 0) {
          var empty = document.createElement('p');
          empty.className = 'empty';
          empty.textContent = 'No listings found - the bookmarklet may not have been run from the right page, or the site layout changed.';
          document.getElementById('results-grid').appendChild(empty);
        }
      }
    });

    // Demo mode (?demo=1): render a couple of sample drafts so people can see
    // what the output looks like without running the bookmarklet. Also used to
    // generate the Chrome Web Store screenshots.
    if (new URLSearchParams(location.search).get('demo') === '1') {
      var demo = [
        { url:'#', description:'Vintage Nike windbreaker\nY2K colourblock windbreaker, barely worn, size L. Detailed zip and working drawcord.',
          price:32, currency:'USD', brand:'Nike', size:'L', condition:'Very good',
          photos:['https://picsum.photos/seed/jkt1/200','https://picsum.photos/seed/jkt2/200','https://picsum.photos/seed/jkt3/200'] },
        { url:'#', description:"Levi's 501 vintage jeans\nClassic mid-wash straight leg, W32 L30.",
          price:28, currency:'USD', brand:"Levi's", size:'32', condition:'Good',
          photos:['https://picsum.photos/seed/jean1/200','https://picsum.photos/seed/jean2/200'] },
        { url:'#', description:'Carhartt beanie\nBlack ribbed watch cap, one size.',
          price:12, currency:'USD', brand:'Carhartt', size:'One size', condition:'New without tags',
          photos:['https://picsum.photos/seed/beanie/200'] }
      ];
      window.postMessage({ type:'progress', done:demo.length, total:demo.length, username:'yourshop' }, location.origin);
      demo.forEach(function (it) { window.postMessage({ type:'item', item:it }, location.origin); });
      window.postMessage({ type:'done', username:'yourshop' }, location.origin);
    }
  </script>
{% endblock %}
