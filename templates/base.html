<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Depop ⇄ Vinted draft assistant</title>
  <meta name="description" content="Cross-list your whole shop between Depop and Vinted in minutes. Reads your listings and hands you copy/paste-ready drafts for the other site — no login, no automation, runs in your own browser.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔁</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Depop ⇄ Vinted">
  <meta property="og:title" content="Cross-list between Depop and Vinted, either direction">
  <meta property="og:description" content="Reads your whole shop and hands you copy/paste-ready drafts for the other site — no login, no automation, runs in your own browser.">
  <meta property="og:url" content="{{ request.url_root }}">
  <meta property="og:image" content="{{ url_for('static', filename='og.png', _external=True) }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cross-list between Depop and Vinted, either direction">
  <meta name="twitter:description" content="Reads your whole shop and hands you copy/paste-ready drafts for the other site — no login, no automation.">
  <meta name="twitter:image" content="{{ url_for('static', filename='og.png', _external=True) }}">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f6fb;
      --surface: #ffffff;
      --surface-2: #f2f3f9;
      --border: #e6e7f0;
      --text: #14161f;
      --text-dim: #6b7080;
      --accent-1: #6d5cf5;
      --accent-2: #a855f7;
      --accent-3: #ec4899;
      --shadow: 0 1px 2px rgba(20,22,31,.04), 0 8px 24px rgba(20,22,31,.06);
      --radius: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0d12;
        --surface: #15161f;
        --surface-2: #1c1e29;
        --border: #2a2c3a;
        --text: #f2f2f7;
        --text-dim: #9498a8;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 32px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(600px 300px at 15% -10%, rgba(109,92,245,.16), transparent 60%),
        radial-gradient(500px 260px at 100% 0%, rgba(236,72,153,.12), transparent 60%);
      background-repeat: no-repeat;
      line-height: 1.5;
    }
    a { color: var(--accent-1); }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: .01em;
      color: var(--text-dim);
      text-decoration: none;
      margin-bottom: 28px;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 3px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      display: inline-block;
    }

    h1 {
      font-size: 2.1rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      background: linear-gradient(120deg, var(--text) 40%, var(--accent-1));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lede { color: var(--text-dim); font-size: 1.02rem; max-width: 56ch; margin: 0 0 22px; }

    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .78rem; font-weight: 600; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 999px;
    }
    .badge svg { width: 13px; height: 13px; flex: none; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    label { display: block; margin-top: 20px; font-weight: 600; font-size: .88rem; }
    label:first-of-type { margin-top: 0; }
    input, textarea {
      width: 100%; margin-top: 8px; padding: 12px 14px;
      font: inherit; font-size: .92rem;
      color: var(--text); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 10px;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus {
      outline: none; border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(109,92,245,.18);
    }
    textarea { resize: vertical; }

    button {
      font: inherit; font-weight: 700; font-size: .92rem;
      border: none; cursor: pointer; color: #fff;
      background: linear-gradient(120deg, var(--accent-1), var(--accent-2));
      padding: 13px 22px; border-radius: 10px;
      box-shadow: 0 6px 20px rgba(109,92,245,.35);
      transition: transform .12s, box-shadow .12s, filter .12s;
    }
    button:hover { filter: brightness(1.08); box-shadow: 0 8px 24px rgba(109,92,245,.45); }
    button:active { transform: translateY(1px); }

    .error {
      color: #ef4444; background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      padding: 10px 14px; border-radius: 10px; font-size: .88rem; margin-bottom: 16px;
    }
    .hint { color: var(--text-dim); font-size: .8rem; margin-top: 6px; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px; overflow: hidden;
      animation: card-in .25s ease-out;
    }
    @keyframes card-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title { font-weight: 700; font-size: 1rem; text-decoration: none; color: var(--text); }
    .price-tag {
      flex: none; font-weight: 700; font-size: .85rem; color: #fff;
      background: linear-gradient(120deg, var(--accent-1), var(--accent-3));
      padding: 5px 12px; border-radius: 999px;
    }
    .photos { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
    .photos a { display: block; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .photos img { width: 84px; height: 84px; object-fit: cover; display: block; transition: transform .15s; }
    .photos img:hover { transform: scale(1.06); }
    .draft {
      white-space: pre-wrap; background: var(--surface-2); border: 1px solid var(--border);
      padding: 14px; border-radius: 10px; font-size: .85rem; color: var(--text-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .copy-btn { margin-top: 14px; padding: 9px 18px; font-size: .82rem; }
    .copy-btn.copied { background: linear-gradient(120deg, #22c55e, #16a34a); }
    .copy-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    .empty { color: var(--text-dim); }

    .field-block { margin-top: 14px; }
    .field-block-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .field-rows { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .field-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
    }
    .field-label { font-size: .78rem; font-weight: 700; color: var(--text-dim); width: 72px; flex: none; }
    .field-value { font-size: .85rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field-copy-btn {
      flex: none; font-size: .75rem; font-weight: 600; padding: 5px 10px; border-radius: 6px;
      background: var(--surface); color: var(--accent-1); border: 1px solid var(--border);
      box-shadow: none;
    }
    .field-copy-btn:hover { filter: none; background: var(--border); }
    .field-copy-btn.copied { background: linear-gradient(120deg, #22c55e, #16a34a); color: #fff; border-color: transparent; }
    .field-copy-btn:disabled { opacity: .35; cursor: not-allowed; }

    .progress-track { background: var(--surface-2); border-radius: 999px; height: 10px; overflow: hidden; }
    .progress-fill { background: linear-gradient(120deg, var(--accent-1), var(--accent-2)); height: 100%; transition: width .3s; }
  </style>
</head>
<body>
  <a class="brand" href="/"><span class="dot"></span>Depop ⇄ Vinted</a>
  {% block body %}{% endblock %}
</body>
</html>
